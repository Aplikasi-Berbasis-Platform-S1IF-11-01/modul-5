<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idul Fitri & THR Online</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #1b4332 0%, #081c15 100%);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            color: #ffffff;
            display: flex;
            align-items: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: 100%;
        }

        .arabic-text {
            font-family: 'Amiri', serif;
            font-size: calc(3rem + 2vw);
            color: #d4af37;
        }

        .btn-thr {
            background: linear-gradient(45deg, #d4af37, #f1c40f);
            color: #081c15;
            border: none;
            font-weight: 800;
            padding: 15px 40px;
            border-radius: 50px;
            transition: 0.3s;
        }

        /* Styling Modal agar Senada */
        .modal-content {
            background: #1b4332;
            border: 2px solid #d4af37;
            border-radius: 20px;
            color: white;
            text-align: center;
        }

        .modal-header { border-bottom: none; }
        .modal-footer { border-top: none; justify-content: center; }

        .nominal-besar {
            font-size: 3rem;
            font-weight: 700;
            color: #d4af37;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            display: block;
            margin: 10px 0;
        }
    </style>
</head>
<body>

<div class="container text-center">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8">
            <h1 class="arabic-text">عيد مبارak</h1>
            <div class="glass-card">
                <h3>Klik tombol di bawah untuk ambil THR kamu!</h3>
                <p class="mb-4 opacity-75">Semoga beruntung dapet nominal gede!</p>
                <button class="btn btn-thr shadow" id="btnAmbil">AMBIL THR SEKARANG ✨</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalThr" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content p-4">
      <div class="modal-header">
        <h5 class="modal-title w-100 fw-bold">ALHAMDULILLAH! 🎉</h5>
      </div>
      <div class="modal-body">
        <p>Selamat! Kamu mendapatkan THR sebesar:</p>
        <span class="nominal-besar" id="hasilNominal">Rp 0</span>
        <p class="small text-white-50 mt-3">"Uangnya sudah masuk ke dompet imajinasi ya!"</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Aamiin, Makasih!</button>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
$(document).ready(function() {
    $("#btnAmbil").click(function() {
        const daftarNominal = ["Rp 50.000", "Rp 100.000", "Rp 500.000", "Rp 1.000.000", "Rp 2.000.000"];
        const random = daftarNominal[Math.floor(Math.random() * daftarNominal.length)];
        
        $(this).html('<span class="spinner-border spinner-border-sm"></span> Loading...');

        setTimeout(function() {
            // Update nominal di modal
            $("#hasilNominal").text(random);
            // Munculkan Modal Bootstrap
            var myModal = new bootstrap.Modal(document.getElementById('modalThr'));
            myModal.show();
            
            $("#btnAmbil").html("THR SUDAH DIAMBIL ✅").prop("disabled", true).addClass("btn-secondary");
        }, 1200);
    });
});
</script>

</body>
</html>
